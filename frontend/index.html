<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Strength Analyzer</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: #ffffff;
      padding: 30px 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    h2 {
      margin-bottom: 10px;
      color: #333;
    }

    p {
      font-size: 14px;
      color: #777;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.2);
    }

    button {
      margin-top: 15px;
      width: 100%;
      padding: 12px;
      font-size: 15px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    #result {
      margin-top: 20px;
      padding: 14px;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 600;
      display: none;
      animation: fadeIn 0.5s ease;
    }

    #details {
      margin-top: 12px;
      font-size: 13px;
      color: #555;
      line-height: 1.5;
    }

    .weak {
      background: #fdecea;
      color: #c0392b;
    }

    .medium {
      background: #fff6e5;
      color: #e67e22;
    }

    .strong {
      background: #eafaf1;
      color: #27ae60;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Password Strength Analyzer</h2>
    <p>Enter a password to check its strength using an AI model.</p>

    <input type="text" id="password" placeholder="Type your password here...">
    <button onclick="checkStrength()">Analyze</button>

    <div id="result"></div>
    <div id="details"></div>
  </div>

  <script>
    async function checkStrength() {
      const password = document.getElementById("password").value;

      if (!password) {
        alert("Please enter a password.");
        return;
      }

      try {
        const response = await fetch("http://localhost:8000/predict", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ password: password })
        });

        const data = await response.json();

        const resultDiv = document.getElementById("result");
        const detailsDiv = document.getElementById("details");

        resultDiv.style.display = "block";
        resultDiv.className = data.strength.toLowerCase();
        resultDiv.textContent = "Strength: " + data.strength;

        const f = data.features;
        detailsDiv.innerHTML = `
          <strong>Features extracted:</strong><br>
          Length: ${f.length} &nbsp;|&nbsp;
          Uppercase: ${f.uppercase} &nbsp;|&nbsp;
          Digits: ${f.digits} &nbsp;|&nbsp;
          Special chars: ${f.special}
        `;
      } catch (error) {
        alert("Error connecting to backend. Make sure Flask server is running.");
        console.error(error);
      }
    }
  </script>
</body>
</html>
