<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Enquiry Chatbot</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="logo">College <span class="highlight">AI</span> Assistant</h1>
                <nav class="nav">
                    <a href="#" class="nav-link active" data-page="chat">Chat</a>
                    <a href="#" class="nav-link" data-page="admin">Admin</a>
                </nav>
            </div>
        </header>

        <!-- Chat Page -->
        <main class="page active" id="chat-page">
            <div class="chat-container">
                <div class="chat-header">
                    <div class="status-indicator">
                        <span class="status-dot"></span>
                        <span class="status-text">AI Assistant Active</span>
                    </div>
                    <button class="clear-chat-btn" id="clearChatBtn">Clear History</button>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <div class="message bot-message">
                        <div class="message-avatar bot-avatar">AI</div>
                        <div class="message-content">
                            <div class="message-text">
                                Hello! I'm your College AI Assistant. I can help you with admissions, courses, fees, campus facilities, and more. What would you like to know?
                            </div>
                            <div class="message-time">Just now</div>
                        </div>
                    </div>
                </div>

                <div class="quick-questions">
                    <button class="quick-btn" data-question="What courses are available?">🎓 Available Courses</button>
                    <button class="quick-btn" data-question="What is the admission process?">📝 Admission Process</button>
                    <button class="quick-btn" data-question="What are the fees?">💰 Fee Structure</button>
                    <button class="quick-btn" data-question="Tell me about campus facilities">🏫 Campus Facilities</button>
                </div>

                <div class="input-container">
                    <textarea 
                        class="message-input" 
                        id="messageInput" 
                        placeholder="Type your question here..."
                        rows="1"
                    ></textarea>
                    <button class="send-btn" id="sendBtn">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- Admin Page -->
        <main class="page" id="admin-page">
            <div class="admin-container">
                <div class="admin-header">
                    <h2>FAQ Management</h2>
                    <button class="add-faq-btn" id="addFaqBtn">+ Add New FAQ</button>
                </div>

                <div class="faq-form" id="faqForm" style="display: none;">
                    <h3>Add New FAQ</h3>
                    <div class="form-group">
                        <label for="faqQuestion">Question</label>
                        <input type="text" id="faqQuestion" placeholder="Enter the question...">
                    </div>
                    <div class="form-group">
                        <label for="faqAnswer">Answer</label>
                        <textarea id="faqAnswer" rows="4" placeholder="Enter the answer..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="faqKeywords">Keywords (comma separated)</label>
                        <input type="text" id="faqKeywords" placeholder="e.g., admission, fees, course">
                    </div>
                    <div class="form-actions">
                        <button class="btn-secondary" id="cancelFaqBtn">Cancel</button>
                        <button class="btn-primary" id="saveFaqBtn">Save FAQ</button>
                    </div>
                </div>

                <div class="faq-list" id="faqList">
                    <!-- FAQ items will be dynamically added here -->
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
